<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Face Recognition</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI";
}

body{
    width:100vw;
    height:100vh;
    background:#000;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* FINESTRA */
.window{
    width:1800px;
    height:900px;

    background:#1e293b;
    border-radius:20px;
    padding:20px;
}

/* TITOL */
.titol{
    width:100%;
    height:70px;

    background:#2563eb;
    border-radius:12px;

    display:flex;
    align-items:center;

    padding-left:20px;

    color:white;
    font-size:28px;
    font-weight:bold;
}

/* CONTINGUT */
.horitzontal{
    margin-top:20px;

    width:100%;
    height:760px;

    display:flex;
    gap:20px;
}

/* VIDEO */
.container_video{
    flex:1;

    background:#020617;
    border-radius:12px;

    padding:15px;

    color:white;

    display:flex;
    flex-direction:column;
}

.container_video h1{
    margin-bottom:10px;
}

.container_video img{
    width:100%;
    height:100%;

    object-fit:cover;

    border-radius:10px;
}

/* COLUMNA DRETA */
.vertical{
    width:520px;

    display:flex;
    flex-direction:column;

    gap:20px;
}

/* RECONEIXEMENT */
.container{
    flex:1;

    background:#020617;
    border-radius:12px;

    padding:15px;

    color:white;

    overflow:hidden;
}

/* MOVIMENT */
.container_mov{
    height:160px;

    background:#020617;
    border-radius:12px;

    padding:15px;

    color:white;
}

/* LLISTA CARES */
#facesContainer{
    margin-top:15px;

    height:calc(100% - 50px);

    overflow-y:auto;

    display:flex;
    flex-direction:column;

    gap:10px;
}

/* TARGETA */
.ident{
    width:100%;
    min-height:80px;

    background:#3b82f6;
    border-radius:10px;

    display:flex;
    align-items:center;

    padding:10px;
}

/* FOTO */
.foto{
    width:60px;
    height:60px;

    border-radius:8px;
    overflow:hidden;

    flex-shrink:0;
}

.foto img{
    width:100%;
    height:100%;

    object-fit:cover;
}

/* TEXT */
.stats{
    margin-left:12px;
    font-size:14px;
    color:white;
}

.ok{
    color:#4ade80;
    font-weight:bold;
}

.no{
    color:#f87171;
}
/*Boto*/
.boto {
    width: 100%;
    height: 50px;

    background: #1e293b;
    color: white;

    border: none;
    border-radius: 10px;

    font-size: 16px;
    font-weight: bold;

    cursor: pointer;

    transition: all 0.2s ease;

    display: flex;
    justify-content: center;
    align-items: center;
}

/* HOVER */
.boto:hover {
    background: #3b82f6;
    transform: scale(1.02);
}

/* CLICK */
.boto:active {
    transform: scale(0.98);
    background: #1d4ed8;
}
</style>
</head>

<body>

<div class="window">

    <div class="titol">
        FACE RECOGNITION TDR
    </div>

    <div class="horitzontal">

        <!-- VIDEO -->
        <div class="container_video">
            <img src="/video">
        </div>

        <!-- SIDEBAR -->
        <div class="vertical">

            <div class="container">
                <h1>RECONEIXEMENT</h1>

                <div id="facesContainer">
                    <p>Esperant detecció...</p>
                </div>
            </div>

            <div class="container_mov">
                <h1>MOVIMENT-SERVO</h1>
                <div class="horitzontal">
                    <button class="boto" onclick="location.href='/esquerra'">
                        ⬅️
                    </button>

                    <button class="boto" onclick="location.href='/dreta'">
                        ➡️
                    </button>
                </div>

            </div>

        </div>

    </div>

</div>

<script>
async function updateFace() {

    try {

        const res = await fetch("/face_data");
        const data = await res.json();

        const container = document.getElementById("facesContainer");

        if (!data.persones || data.persones.length === 0) {

            container.innerHTML = "<p>Esperant detecció...</p>";
            return;
        }

        container.innerHTML = "";

        data.persones.forEach(p => {

            if (!p.nom) return;

            const card = document.createElement("div");
            card.className = "ident";

            card.innerHTML = `
                <div class="foto">
                    <img src="${p.img ? '/static/' + p.img : '/static/default.jpg'}">
                </div>

                <div class="stats">
                    <p class="ok">✅ ${p.nom}</p>
                    <p>Edat: ${p.edat ?? '-'}</p>
                    <p>Rol: ${p.rol ?? '-'}</p>
                </div>
            `;

            container.appendChild(card);
        });

    } catch(e) {

        console.log("Error:", e);
    }
}

updateFace();
setInterval(updateFace, 1000);
</script>

</body>
</html>
